spring:
  main:
    web-application-type: none
    banner-mode: off
  ai:
    mcp:
      server:
        stdio: true
        name: wiki-agent
        version: 1.0.0

wiki:
  wiki-path: ${WIKI_PATH:./wiki}
  raw-path: ${RAW_PATH:./raw}
  openai-api-key: ${OPENAI_API_KEY:}

logging:
  file:
    name: logs/wiki-agent.log
  level:
    root: WARN
    com.wiki.agent: INFO
